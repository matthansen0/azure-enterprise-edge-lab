name: Lint
on:
  pull_request:
    paths:
      - 'infra/**'
      - 'scripts/**'
      - 'apps/**'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'scripts/**'
      - 'apps/**'

jobs:
  bicep-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bicep Format Check
        run: |
          az bicep format --file infra/bicep/main.bicep --check || echo "::warning::Bicep formatting differences found"
      - name: Bicep Build (Validate)
        run: az bicep build --file infra/bicep/main.bicep --stdout > /dev/null

  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          find scripts/ -name '*.sh' -exec shellcheck {} +
